<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal - AI Workspace</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Consolas','Courier New',monospace}
body{background:#0d0d0d;color:#e0e0e0;min-height:100vh}
header{background:#1a1a1a;padding:12px 20px;border-bottom:1px solid #333;display:flex;align-items:center;gap:12px}
header a{color:#888;text-decoration:none;font-size:12px}
header a:hover{color:#10A37F}
h1{font-size:14px;color:#10A37F;flex:1}
#terminal{background:#000;min-height:calc(100vh - 120px);padding:12px;overflow-y:auto;font-size:14px;line-height:1.6}
#output{white-space:pre-wrap;word-break:break-all}
.prompt{color:#10A37F}
.error{color:#ff6b6b}
.success{color:#69db7c}
.info{color:#888;font-size:12px}
#input-line{display:flex;background:#000;border-top:1px solid #222;padding:8px 12px;align-items:center}
.prompt-char{color:#10A37F;font-size:14px;margin-right:8px}
#command-input{flex:1;background:#000;border:none;color:#e0e0e0;font-size:14px;font-family:monospace;outline:none}
#command-input::placeholder{color:#444}
.cursor{animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.loading::after{content:'...';animation:dots 1.5s steps(4) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
</style>
</head>
<body>
<header>
<a href="/">&larr; Dashboard</a>
<h1>&#x1F4BB; Terminal</h1>
<span style="font-size:11px;color:#666" id="cwd">/workspace</span>
</header>
<div id="terminal">
<div id="output">
<div class="info"># AI Workspace Terminal - Type help for commands</div>
</div>
</div>
<div id="input-line">
<span class="prompt-char">$</span>
<input type="text" id="command-input" placeholder="Ketik perintah..." autofocus>
</div>
<script>
const output = document.getElementById('output');
const input = document.getElementById('input-line');
const cmdInput = document.getElementById('command-input');
const cwd = document.getElementById('cwd');

function addOutput(text, cls = '') {
    const div = document.createElement('div');
    div.className = cls;
    div.textContent = text;
    output.appendChild(div);
    output.parentElement.scrollTop = output.parentElement.scrollHeight;
}

function addPrompt(cmd) {
    const div = document.createElement('div');
    div.className = 'prompt';
    div.textContent = '$ ' + cmd;
    output.appendChild(div);
    output.parentElement.scrollTop = output.parentElement.scrollHeight;
}

cmdInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        const cmd = cmdInput.value.trim();
        if (!cmd) return;
        cmdInput.value = '';
        addPrompt(cmd);
        
        if (cmd === 'help') {
            addOutput('Available commands: run any Linux command', 'info');
            addOutput('  ls, cat, pwd, mkdir, python, node, echo, etc.', 'info');
            addOutput('  clear - clear terminal', 'info');
            addOutput('  files - list workspace files', 'info');
            return;
        }
        if (cmd === 'clear') {
            output.innerHTML = '<div class="info"># Terminal cleared</div>';
            return;
        }
        if (cmd === 'files') {
            fetch('/api/files').then(r=>r.json()).then(d=>{
                if (d.files) d.files.forEach(f => {
                    addOutput((f.isDir ? '📁 ' : '📄 ') + f.path + ' (' + f.size + ' bytes)');
                });
            });
            return;
        }
        
        // Execute command
        const loadingId = 'loading-' + Date.now();
        addOutput('Running...', 'info');
        
        fetch('/api/exec', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({command: cmd})
        })
        .then(r => r.json())
        .then(d => {
            // Remove loading
            const lastChild = output.lastElementChild;
            if (lastChild && lastChild.className === 'info') lastChild.remove();
            
            if (d.output) addOutput(d.output);
            if (d.exitCode !== 0) {
                addOutput('Exit code: ' + d.exitCode, 'error');
            }
        })
        .catch(err => {
            const lastChild = output.lastElementChild;
            if (lastChild && lastChild.className === 'info') lastChild.remove();
            addOutput('Error: ' + err.message, 'error');
        });
    }
});

// Focus management
document.addEventListener('click', () => cmdInput.focus());

// Initial status
fetch('/api/status').then(r=>r.json()).then(d => {
    if (d.workspace) addOutput('Workspace: ' + d.workspace, 'info');
});
</script>
</body>
</html>
